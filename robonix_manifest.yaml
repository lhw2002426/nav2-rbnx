manifestVersion: 1

build:
  script: scripts/build.sh

package:
  id: com.vendor.nav2_rbnx
  name: nav2_rbnx
  version: 0.0.1
  vendor: vendor
  description: Nav2 package integrated with Robonix via MCP tools and agent skill
  license: Apache-2.0

nodes:
  - id: com.vendor.nav2
    type: python
    start: >
      source /opt/ros/humble/setup.bash &&
      bash ./scripts/start.sh &&
      exec python3 -m nav2_rbnx_agent.node
